project:
  type: website
  output-dir: _site
  pre-render:
    - scripts/copy-contract-assets.R
  post-render:
    - scripts/copy-analysis-html.R
  render:
    - content/index.qmd
    - content/project/project-proposal.qmd
    - content/pipeline/pipeline-guide.qmd
    - content/pipeline/cache-manifest.qmd
    - content/pipeline/input-manifest.qmd
    - content/data-primer/variable-inclusion.qmd
    - content/data-primer/univariate.qmd
    - content/analysis/outcome-decomposition.qmd
    - content/analysis/outcome-shapes.qmd
    - content/analysis/exposure.qmd
    - content/analysis/predisposing.qmd
    - content/analysis/facilitating.qmd
    - content/analysis/needs.qmd
    - content/analysis/missingness.qmd
    - content/site-map.qmd

website:
  title: "Absent from Chronic"
  navbar:
    left:
      - text: "Home"
        href: content/index.qmd
      - text: "Project"
        href: content/project/project-proposal.qmd
      - text: "Pipeline"
        menu:
          - text: "Pipeline Guide"
            href: content/pipeline/pipeline-guide.qmd
          - text: "CACHE Manifest"
            href: content/pipeline/cache-manifest.qmd
          - text: "INPUT Manifest"
            href: content/pipeline/input-manifest.qmd
      - text: "Data Primer"
        menu:
          - text: "Variable Inclusion"
            href: content/data-primer/variable-inclusion.qmd
          - text: "Univariate Distributions"
            href: content/data-primer/univariate.qmd
      - text: "Analysis"
        menu:
          - text: "Outcome (LOP Day Decomposition)"
            href: content/analysis/outcome-decomposition.qmd
          - text: "Outcome (Distribution Shapes)"
            href: content/analysis/outcome-shapes.qmd
          - text: "Exposure (Chronic Conditions)"
            href: content/analysis/exposure.qmd
          - text: "Predisposing (Socio-demographic)"
            href: content/analysis/predisposing.qmd
          - text: "Facilitating (Health System & Behaviours)"
            href: content/analysis/facilitating.qmd
          - text: "Needs (Perceived Health & Limitations)"
            href: content/analysis/needs.qmd
          - text: "Missingness"
            href: content/analysis/missingness.qmd
      - text: "Site Map"
