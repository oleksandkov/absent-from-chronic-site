      - text: "Home"
        href: content/index.qmd
      - text: "Project"
        menu:
          - text: "Project Proposal"
            href: content/project/project-proposal.qmd
      - text: "Pipeline"
        menu:
          - text: "Pipeline Guide"
            href: content/pipeline/pipeline-guide.qmd
          - text: "CACHE Manifest"
            href: content/pipeline/cache-manifest.qmd
          - text: "INPUT Manifest"
            href: content/pipeline/input-manifest.qmd
      - text: "Data Primer"
        menu:
          - text: "Variable Inclusion"
            href: content/data-primer/variable-inclusion.qmd
          - text: "Univariate Distributions"
            href: content/data-primer/univariate-distributions.qmd
      - text: "Analysis"
        menu:
          - text: "Outcome (LOP Day Decomposition)"
            href: content/analysis/outcome.qmd
          - text: "Outcome (Distribution Shapes)"
            href: content/analysis/outcome-distribution.qmd
          - text: "Exposure (Chronic Conditions)"
            href: content/analysis/exposure.qmd
          - text: "Predisposing (Socio-demographic)"
            href: content/analysis/predisposing.qmd
          - text: "Facilitating (Health System & Behaviours)"
