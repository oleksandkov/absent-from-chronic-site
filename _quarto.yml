project:
  type: website
  output-dir: _site
  # pre-render and post-render R scripts removed for Vercel deployment
  # (R is not available in Vercel's build environment; images are already in content/images/)
  render:
    - content/index.qmd
    - content/project/project-proposal.qmd
    - content/pipeline/pipeline-guide.qmd
    - content/pipeline/cache-manifest.qmd
    - content/pipeline/input-manifest.qmd
    - content/data-primer/variable-inclusion.qmd
    - content/data-primer/univariate-distributions.qmd
    - content/analysis/outcome.qmd
    - content/analysis/outcome-distribution.qmd
    - content/analysis/exposure.qmd
    - content/analysis/predisposing.qmd
    - content/analysis/facilitating.qmd
    - content/analysis/needs.qmd
    - content/analysis/missingness.qmd
    - content/site-map.qmd

website:
