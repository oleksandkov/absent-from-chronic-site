[build]
  command = "bash ./scripts/netlify-build.sh"
  publish = "_site"

[build.environment]
  QUARTO_PYTHON = "3.11"
  R_VERSION = "4.3"

# Rewrite clean URLs to the nested Quarto output under content/
[[redirects]]
  from = "/"
  to = "/content/index.html"
  status = 200

[[redirects]]
  from = "/site-map.html"
  to = "/content/site-map.html"
  status = 200

[[redirects]]
  from = "/project/*"
  to = "/content/project/:splat"
  status = 200

[[redirects]]
  from = "/pipeline/*"
  to = "/content/pipeline/:splat"
  status = 200

[[redirects]]
  from = "/data-primer/*"
  to = "/content/data-primer/:splat"
  status = 200

[[redirects]]
  from = "/analysis/*"
  to = "/content/analysis/:splat"
  status = 200

# Cache configuration
[cache]
  directory = "node_modules"

# Headers for static assets
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
